syntax = "proto3";

package verification;

// ── Request messages ─────────────────────────────────────────────────────────

// Charity quota + no-show check — Claim Service calls before locking inventory
message VerifyRequest {
  int32 charity_id  = 1;
  int32 listing_id  = 2;
}

// Public user anti-scalping check — Payment Service calls before processing purchase
message VerifyUserRequest {
  int32 user_id    = 1;
  int32 listing_id = 2;
}

// Record a charity no-show — written when a charity fails to collect their claim
message RecordNoShowRequest {
  int32 charity_id = 1;
  int32 claim_id   = 2;
}

// Cancel a charity claim — restores one quota slot for today
message CancelClaimRequest {
  int32 charity_id = 1;
  int32 listing_id = 2;
}

// Record a public user no-show after a paid purchase (food wastage tracking)
message RecordUserNoShowRequest {
  int32  user_id        = 1;
  string transaction_id = 2;
}

// Full status queries — OutSystems wrapper calls after login to enrich the JWT response
message CharityStatusRequest {
  int32 charity_id = 1;
}

message UserStatusRequest {
  int32 user_id = 1;
}

message VendorStatusRequest {
  int32 vendor_id = 1;
}

// ── Response messages ─────────────────────────────────────────────────────────

message VerifyResponse {
  bool   approved         = 1;  // true = eligible to proceed
  string rejection_reason = 2;  // "QUOTA_EXCEEDED" | "TOO_MANY_NOSHOWS" | "SCALPING_FLAG" | ""
}

message RecordNoShowResponse {
  bool  recorded      = 1;  // always true on success
  int32 total_noshows = 2;  // lifetime no-show count for this charity
}

message CancelClaimResponse {
  bool cancelled = 1;
}

message RecordUserNoShowResponse {
  bool  recorded      = 1;
  int32 total_noshows = 2;
}

message CharityStatusResponse {
  bool   is_banned       = 1;  // derived: cooldown_expires_at > now AND appeal != APPROVED
  string ban_reason      = 2;  // "TOO_MANY_NOSHOWS" | ""
  string cooldown_until  = 3;  // ISO 8601 datetime string, "" if not in cooldown
  int32  warning_count   = 4;  // cumulative warning count
  int32  recent_noshows  = 5;  // no-shows in rolling NOSHOWS_WINDOW_DAYS window
  int32  claimed_today   = 6;  // claims made today (anti-hoarding quota)
  string appeal_status   = 7;  // "NONE" | "PENDING" | "APPROVED" | "REJECTED"
}

message UserStatusResponse {
  bool   is_flagged    = 1;
  string flag_reason   = 2;
  int32  flag_count    = 3;
  int32  total_noshows = 4;
}

message VendorStatusResponse {
  bool   is_compliant       = 1;  // derived: db_flag AND license not expired
  string compliance_flag    = 2;  // reason for non-compliance, "" if compliant
  string license_expires_at = 3;  // ISO 8601 datetime string, "" if no expiry set
}

// ── Service ──────────────────────────────────────────────────────────────────
// OutSystems handles auth (login / JWT). This service handles business rules only.
service VerificationService {
  // Daily quota (anti-hoarding) + cooldown/ban check
  rpc VerifyCharity    (VerifyRequest)          returns (VerifyResponse);
  // Admin-set scalping flag check (no daily quota for public users)
  rpc VerifyPublicUser (VerifyUserRequest)       returns (VerifyResponse);
  // Record a charity no-show; upserts CharityStanding with escalating cooldown
  rpc RecordNoShow     (RecordNoShowRequest)     returns (RecordNoShowResponse);
  // Cancel a charity claim — quota slot returned for today
  rpc CancelClaim         (CancelClaimRequest)       returns (CancelClaimResponse);
  // Record a public user no-show after paid purchase — food wastage tracking
  rpc RecordUserNoShow    (RecordUserNoShowRequest)   returns (RecordUserNoShowResponse);
  // Full charity standing — called by OutSystems wrapper after login
  rpc GetCharityStatus (CharityStatusRequest)    returns (CharityStatusResponse);
  // Full public user standing — called by OutSystems wrapper after login
  rpc GetUserStatus    (UserStatusRequest)       returns (UserStatusResponse);
  // Vendor compliance state — called by OutSystems wrapper after login
  rpc GetVendorStatus  (VendorStatusRequest)     returns (VendorStatusResponse);
}
