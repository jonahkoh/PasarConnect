syntax = "proto3";

package inventory;

// LockListing is used by claim and payment orchestration flows.
// Called by: Claim Service (AVAILABLE → PENDING_COLLECTION)
//            Claim Service (PENDING_COLLECTION → AVAILABLE)  **Rollback if claim redraw**
//            Payment Service (AVAILABLE → PENDING_PAYMENT)
//            Payment Service (PENDING_PAYMENT → SOLD)
//            Payment Service (PENDING_PAYMENT → AVAILABLE)   **Rollback if payment fails**
// CreateListing is used by Listing Service to create inventory rows.

service InventoryService {
  rpc CreateListing (CreateListingRequest) returns (CreateListingResponse);
  rpc LockListing   (LockListingRequest)   returns (LockListingResponse);
  // Fetch a listing's current state — used by Claim Service to determine queue window age
  rpc GetListing    (GetListingRequest)    returns (GetListingResponse);
}

message GetListingRequest {
  int32 listing_id = 1;
}

message GetListingResponse {
  int32  listing_id = 1;
  int32  version    = 2;
  string status     = 3;  // AVAILABLE | PENDING_COLLECTION | etc.
  string listed_at  = 4;  // ISO-8601 UTC — created_at of the listing row
  double price      = 5;  // public sale price in SGD; 0.0 means not set
}

message CreateListingRequest {
  string vendor_id = 1;
  string title = 2;
  string description = 3;
  int32 quantity = 4;
  double weight_kg = 5;
  string expiry = 6;
  string image_url = 7;
  double latitude = 8;   // 0.0 means "not provided" (sentinel, same pattern as quantity/weight_kg)
  double longitude = 9;  // 0.0 means "not provided"
}

message CreateListingResponse {
  bool success = 1;
  int32 listing_id = 2;
}

// The four valid status transitions via gRPC.
enum NewStatus {
  AVAILABLE             = 0;
  PENDING_PAYMENT       = 1;
  PENDING_COLLECTION    = 2;
  SOLD                  = 3;
  SOLD_PENDING_COLLECTION = 4;
}

message LockListingRequest {
  int32     listing_id       = 1;
  int32     expected_version = 2;  // caller must send the version it last read
  NewStatus new_status       = 3;
}

message LockListingResponse {
  bool  success     = 1;
  int32 new_version = 2;  // caller should store this for the next lock attempt
}
