syntax = "proto3";

package paymentlog;

service PaymentLogService {
  rpc CreatePaymentLog (CreatePaymentLogRequest) returns (CreatePaymentLogResponse);
  rpc GetPaymentLog (GetPaymentLogRequest) returns (GetPaymentLogResponse);
  rpc UpdatePaymentStatus (UpdatePaymentStatusRequest) returns (UpdatePaymentStatusResponse);
}

enum PaymentStatus {
  PAYMENT_STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  SUCCESS = 2;
  COLLECTED = 3;
  REFUNDED = 4;   // money returned to user
  FAILED = 5;
  FORFEITED = 6;  // user no-showed after window — no refund issued
}

message CreatePaymentLogRequest {
  string transaction_id = 1;
  int32 listing_id = 2;
  int32 listing_version = 3;
  double amount = 4;
  int32 user_id = 5;  // the public user who made the purchase
}

message CreatePaymentLogResponse {
  bool success = 1;
  string transaction_id = 2;
  PaymentStatus status = 3;
  int32 listing_id = 4;
  int32 listing_version = 5;
  double amount = 6;
}

message GetPaymentLogRequest {
  string transaction_id = 1;
}

message GetPaymentLogResponse {
  bool found = 1;
  string transaction_id = 2;
  PaymentStatus status = 3;
  int32 listing_id = 4;
  int32 listing_version = 5;
  double amount = 6;
  string created_at = 7;  // ISO 8601 UTC — when intent was created
  string updated_at = 8;  // ISO 8601 UTC — when status last changed; empty if never updated
  int32 user_id = 9;      // the public user who made the purchase
}

message UpdatePaymentStatusRequest {
  string transaction_id = 1;
  PaymentStatus new_status = 2;
  int32 listing_version = 3;
  bool use_listing_version = 4;
}

message UpdatePaymentStatusResponse {
  bool success = 1;
  string transaction_id = 2;
  PaymentStatus status = 3;
  int32 listing_id = 4;
  int32 listing_version = 5;
  double amount = 6;
}
