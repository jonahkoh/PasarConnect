_format_version: "3.0"
_transform: true

# PasarConnect — Kong DB-less declarative config
# Phase 2: JWT enforcement on protected API routes
#
# Protected routes (require valid RS256 JWT from OutSystems):
#   /api/listings, /api/claims, /api/payments, /api/waitlist, /api/inventory
#
# Unprotected routes (no JWT required):
#   /auth/*   — login/register (user must authenticate to receive a token)
#   /admin/*  — OutSystems AdminAuth (protected by X-API-Key at the wrapper level)
#   /webhooks — Stripe webhook (signed by Stripe, not a user JWT)
#   /*/health — health checks (no auth needed)
#
# Kong JWT plugin lookup:
#   Token header: Authorization: Bearer <token>
#   Kong reads iss claim → finds credential with matching key → verifies RS256 signature

services:

  # ── OutSystems Auth Wrapper (port 8007) ──────────────────────────────────
  # All login/register endpoints start with /auth/; admin endpoints with /admin/.
  # strip_path=false preserves the full path — the wrapper already has /auth/* routes.
  - name: outsystems-service
    url: http://outsystems-service:8007
    routes:
      - name: outsystems-auth
        paths:
          - /auth
        strip_path: false
      - name: outsystems-admin
        paths:
          - /admin
        strip_path: false

  # ── Listing Service (port 8008) ───────────────────────────────────────────
  # Main endpoint: POST /api/listings — path already matches Kong route, no strip.
  - name: listing-service
    url: http://listing-service:8008
    routes:
      - name: listing-api
        paths:
          - /api/listings
        strip_path: false   # /api/listings on kong → /api/listings on service ✓

  # Listing health — more specific route wins over /api/listings prefix.
  # strip_path=true strips /api/listings/health entirely; service URL path /health appended.
  - name: listing-service-health
    url: http://listing-service:8008/health
    routes:
      - name: listing-health
        paths:
          - /api/listings/health
        strip_path: true

  # ── Claim Service (port 8002) ─────────────────────────────────────────────
  # Endpoints: /claims, /claims/{id}, /claims/{id}/cancel, ...
  # Kong strips /api/claims; service URL /claims is prepended to the remainder.
  - name: claim-service
    url: http://claim-service:8002/claims
    routes:
      - name: claim-api
        paths:
          - /api/claims
        strip_path: true    # /api/claims/123 → strip → /123 → upstream /claims/123 ✓

  - name: claim-service-health
    url: http://claim-service:8002/health
    routes:
      - name: claim-health
        paths:
          - /api/claims/health
        strip_path: true

  # ── Payment Service (port 8003) ───────────────────────────────────────────
  # Endpoints: /payments/intent, /payments/{id}/approve, /payments/{id}/reject, ...
  # Kong strips /api/payments; service URL /payments is prepended.
  - name: payment-service
    url: http://payment-service:8003/payments
    routes:
      - name: payment-api
        paths:
          - /api/payments
        strip_path: true    # /api/payments/intent → strip → /intent → upstream /payments/intent ✓

  # Stripe webhook lives at /webhooks/stripe — different prefix, route separately.
  - name: payment-webhook-service
    url: http://payment-service:8003
    routes:
      - name: payment-webhooks
        paths:
          - /webhooks
        strip_path: false   # /webhooks/stripe forwarded as-is ✓

  - name: payment-service-health
    url: http://payment-service:8003/health
    routes:
      - name: payment-health
        paths:
          - /api/payments/health
        strip_path: true

  # ── Inventory Service (port 8001) ─────────────────────────────────────────
  # Endpoints: /listings, /listings/search/nearby, /listings/{id}
  # Kong strips /api/inventory; service URL /listings is prepended.
  - name: inventory-service
    url: http://inventory-service:8001/listings
    routes:
      - name: inventory-api
        paths:
          - /api/inventory
        strip_path: true    # /api/inventory/search/nearby → strip → /search/nearby → upstream /listings/search/nearby ✓

  - name: inventory-service-health
    url: http://inventory-service:8001/health
    routes:
      - name: inventory-health
        paths:
          - /api/inventory/health
        strip_path: true

  # ── Waitlist Service (port 8010) ──────────────────────────────────────────
  # Endpoints: /waitlist/{listing_id}/entries
  # Kong strips /api/waitlist; service URL /waitlist is prepended.
  - name: waitlist-service
    url: http://waitlist-service:8010/waitlist
    routes:
      - name: waitlist-api
        paths:
          - /api/waitlist
        strip_path: true    # /api/waitlist/1/entries → strip → /1/entries → upstream /waitlist/1/entries ✓

  - name: waitlist-service-health
    url: http://waitlist-service:8010/health
    routes:
      - name: waitlist-health
        paths:
          - /api/waitlist/health
        strip_path: true

  # ── Notification Service WebSocket (port 8011) ────────────────────────────
  # Socket.io endpoint — handles both HTTP long-polling and WebSocket upgrade.
  # NO JWT plugin: Socket.io itself verifies the RS256 token at handshake time.
  - name: notification-service
    url: http://notification-service:8011
    routes:
      - name: notification-ws
        paths:
          - /socket.io
        strip_path: false
        protocols:
          - http
          - https
          - ws
          - wss

# ── Consumers ─────────────────────────────────────────────────────────────────
# One consumer represents all PasarConnect users.
# Kong resolves the credential by matching the JWT iss claim to the credential key.

consumers:
  - username: pasarconnect-users
    jwt_secrets:
      - algorithm: RS256
        key: FoodloopVerification           # must match iss claim in every OutSystems token
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAoyhXhdncQ/QQZgKjJ/Lf
          UImMcbgVwqG9i+oKuMKVvEcG6Z34/5utcdgw9L93o5Z8z0h+SSgmtZtAHZRzi55B
          JjsFBcgQPbACXJHoCDZPY96ZajCy6thrNBCHYSsPxQ3+cbMawuyHjJPiPeFA/EEj
          kalyZ5tGSoGtoZiQyy+0iTlwT4suqRu9XENhDuEUq3W2Un+E64djgK7rZA57Cwpe
          9mMmWrcVtI52qO3rjDFrtdxNc1uokxhk87G98+/EE960+tD80gtSJr21ri7UW5R9
          M58Xf8MleHmC9oyvIiHSHRSxlsbQLGgHUyF85U60Ufl0HyPqTz3lS+rFUh305Gwb
          GwIDAQAB
          -----END PUBLIC KEY-----

# ── Plugins ───────────────────────────────────────────────────────────────────
# JWT plugin applied per-route on the 5 protected API route groups.
# key_claim_name: iss → tells Kong to use the iss claim to look up the consumer credential.
# claims_to_verify: exp → Kong rejects expired tokens (in addition to signature check).

plugins:
  - name: jwt
    route: listing-api
    config:
      key_claim_name: iss
      claims_to_verify:
        - exp

  - name: jwt
    route: claim-api
    config:
      key_claim_name: iss
      claims_to_verify:
        - exp

  - name: jwt
    route: payment-api
    config:
      key_claim_name: iss
      claims_to_verify:
        - exp

  - name: jwt
    route: inventory-api
    config:
      key_claim_name: iss
      claims_to_verify:
        - exp

  - name: jwt
    route: waitlist-api
    config:
      key_claim_name: iss
      claims_to_verify:
        - exp
