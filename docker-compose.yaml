services:

  # ── Databases ──────────────────────────────────────────────────────────────

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${INVENTORY_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${INVENTORY_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  claim-log-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${CLAIM_LOG_DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - claim-log-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${CLAIM_LOG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-log-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${PAYMENT_LOG_DB_NAME}
    ports:
      - "5435:5432"
    volumes:
      - payment-log-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${PAYMENT_LOG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  verification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${VERIFICATION_DB_NAME}
    ports:
      - "5436:5432"
    volumes:
      - verification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${VERIFICATION_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  waitlist-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${WAITLIST_DB_NAME:-waitlist_db}
    ports:
      - "5437:5432"
    volumes:
      - waitlist-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${WAITLIST_DB_NAME:-waitlist_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Message Broker ─────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: on-failure
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ── Services ───────────────────────────────────────────────────────────────

  inventory-service:
    build:
      context: ./backend
      dockerfile: inventory/Dockerfile
    ports:
      - "8001:8001"   # HTTP
      - "50051:50051" # gRPC
    environment:
      DB_HOST:     ${INVENTORY_DB_HOST}
      DB_PORT:     ${INVENTORY_DB_PORT}
      DB_USER:     ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME:     ${INVENTORY_DB_NAME}
      USE_SQLITE:  "false"
    depends_on:
      inventory-db:
        condition: service_healthy

  listing-service:
    build:
      context: ./backend
      dockerfile: listing/Dockerfile
    restart: on-failure
    ports:
      - "8008:8008"
    environment:
      INVENTORY_GRPC_HOST:  ${INVENTORY_GRPC_HOST}
      INVENTORY_GRPC_PORT:  ${INVENTORY_GRPC_PORT}
      RABBITMQ_HOST:        ${RABBITMQ_HOST}
      RABBITMQ_USER:        ${RABBITMQ_USER}
      RABBITMQ_PASS:        ${RABBITMQ_PASS}
      QUEUE_WINDOW_MINUTES: ${QUEUE_WINDOW_MINUTES:-0.5}
      PUBLIC_KEY_PATH:      ${PUBLIC_KEY_PATH}
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      inventory-service:
        condition: service_started

  claim-service:
    build:
      context: ./backend
      dockerfile: claim/Dockerfile
    restart: on-failure
    ports:
      - "8002:8002"
    environment:
      INVENTORY_GRPC_HOST:     ${INVENTORY_GRPC_HOST}
      INVENTORY_GRPC_PORT:     ${INVENTORY_GRPC_PORT}
      CLAIM_LOG_GRPC_HOST:     ${CLAIM_LOG_GRPC_HOST}
      CLAIM_LOG_GRPC_PORT:     ${CLAIM_LOG_GRPC_PORT}
      RABBITMQ_HOST:           ${RABBITMQ_HOST}
      RABBITMQ_USER:           ${RABBITMQ_USER}
      RABBITMQ_PASS:           ${RABBITMQ_PASS}
      VERIFICATION_GRPC_HOST:  ${VERIFICATION_GRPC_HOST}
      VERIFICATION_GRPC_PORT:  ${VERIFICATION_GRPC_PORT}
      PUBLIC_KEY_PATH:         ${PUBLIC_KEY_PATH}
      WAITLIST_SERVICE_URL:    http://waitlist-service:8010
      WAITLIST_GRPC_HOST:      waitlist-service
      WAITLIST_GRPC_PORT:      50053
      CANCEL_WINDOW_MINUTES:   ${CANCEL_WINDOW_MINUTES:-15}
      QUEUE_WINDOW_MINUTES: ${QUEUE_WINDOW_MINUTES:-0.5}
      OFFER_WINDOW_SECONDS: ${OFFER_WINDOW_SECONDS:-30}
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      inventory-service:
        condition: service_started
      claim-log-service:
        condition: service_started
      verification-service:
        condition: service_started
      waitlist-service:
        condition: service_started

  waitlist-service:
    build:
      context: ./backend
      dockerfile: waitlist/Dockerfile
    ports:
      - "8010:8010"
      - "50053:50053"  # gRPC
    environment:
      DB_HOST:             ${WAITLIST_DB_HOST:-waitlist-db}
      DB_PORT:             ${WAITLIST_DB_PORT:-5432}
      DB_USER:             ${POSTGRES_USER}
      DB_PASSWORD:         ${POSTGRES_PASSWORD}
      DB_NAME:             ${WAITLIST_DB_NAME:-waitlist_db}
      WAITLIST_GRPC_PORT:  50053
    depends_on:
      waitlist-db:
        condition: service_healthy

  outsystems-service:
    build:
      context: ./backend
      dockerfile: outsystems_wrapper/Dockerfile
    ports:
      - "8007:8007"   # HTTP — charity/vendor/public user login → OutSystems → JWT
    environment:
      OUTSYSTEMS_API_URL:         ${OUTSYSTEMS_API_URL}
      OUTSYSTEMS_ADMIN_URL:       ${OUTSYSTEMS_ADMIN_URL}
      OUTSYSTEMS_ADMIN_API_KEY:   ${OUTSYSTEMS_ADMIN_API_KEY}
      OUTSYSTEMS_TIMEOUT_SECONDS: ${OUTSYSTEMS_TIMEOUT_SECONDS}
      VERIFICATION_GRPC_HOST:     ${VERIFICATION_GRPC_HOST}
      VERIFICATION_GRPC_PORT:     ${VERIFICATION_GRPC_PORT}

  verification-service:
    build:
      context: ./backend
      dockerfile: verification/Dockerfile
    ports:
      - "8009:8009"   # HTTP — /health only
      - "50052:50052" # gRPC — VerifyCharity, VerifyPublicUser, RecordNoShow, Get*Status
    environment:
      VERIFICATION_GRPC_PORT:  ${VERIFICATION_GRPC_PORT}
      DATABASE_URL:            postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${VERIFICATION_DB_HOST}:${VERIFICATION_DB_PORT}/${VERIFICATION_DB_NAME}
      MAX_DAILY_CLAIMS:        ${MAX_DAILY_CLAIMS}
      MAX_NOSHOWS:             ${MAX_NOSHOWS}
      NOSHOWS_WINDOW_DAYS:     ${NOSHOWS_WINDOW_DAYS}
      BASE_COOLDOWN_DAYS:      ${BASE_COOLDOWN_DAYS}
      PUBLIC_KEY_PATH:         ${PUBLIC_KEY_PATH}
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      verification-db:
        condition: service_healthy

  claim-log-service:
    build:
      context: ./backend
      dockerfile: claim_log/Dockerfile
    ports:
      - "8006:8006"
    expose:
      - "${CLAIM_LOG_GRPC_PORT}"
    environment:
      DB_HOST:               ${CLAIM_LOG_DB_HOST}
      DB_PORT:               ${CLAIM_LOG_DB_PORT}
      DB_USER:               ${POSTGRES_USER}
      DB_PASSWORD:           ${POSTGRES_PASSWORD}
      DB_NAME:               ${CLAIM_LOG_DB_NAME}
      CLAIM_LOG_GRPC_PORT:   ${CLAIM_LOG_GRPC_PORT}
    depends_on:
      claim-log-db:
        condition: service_healthy

  payment-service:
    build:
      context: ./backend
      dockerfile: payment/Dockerfile
    restart: on-failure
    ports:
      - "8003:8003"
    environment:
      INVENTORY_GRPC_HOST:      ${INVENTORY_GRPC_HOST}
      INVENTORY_GRPC_PORT:      ${INVENTORY_GRPC_PORT}
      RABBITMQ_HOST:            ${RABBITMQ_HOST}
      RABBITMQ_USER:            ${RABBITMQ_USER}
      RABBITMQ_PASS:            ${RABBITMQ_PASS}
      STRIPE_WRAPPER_URL:           ${STRIPE_WRAPPER_URL}
      PAYMENT_LOG_GRPC_HOST:        ${PAYMENT_LOG_GRPC_HOST}
      PAYMENT_LOG_GRPC_PORT:        ${PAYMENT_LOG_GRPC_PORT}
      VERIFICATION_GRPC_HOST:       ${VERIFICATION_GRPC_HOST}
      VERIFICATION_GRPC_PORT:       ${VERIFICATION_GRPC_PORT}
      QUEUE_WINDOW_MINUTES:         ${QUEUE_WINDOW_MINUTES:-0.5}
      CANCELLATION_WINDOW_MINUTES:  ${CANCELLATION_WINDOW_MINUTES:-10}
      VENDOR_WARNING_MINUTES:       ${VENDOR_WARNING_MINUTES:-30}
      PUBLIC_KEY_PATH:              ${PUBLIC_KEY_PATH}
      PAYMENT_LOG_HTTP_URL:         http://payment-log-service:8005
      VERIFICATION_HTTP_URL:        http://verification-service:8009
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      inventory-service:
        condition: service_started
      stripe-wrapper:
        condition: service_started
      payment-log-service:
        condition: service_started
      verification-service:
        condition: service_started

  stripe-wrapper:
    build:
      context: ./backend
      dockerfile: stripe_wrapper/Dockerfile
    ports:
      - "8004:8004"
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    # Fully stateless — no DB, no message broker.

  media-service:
    build:
      context: ./backend/media
    ports:
      - "8080:8080"
    environment:
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET:         ${AWS_S3_BUCKET}
      AWS_REGION:            ${AWS_REGION}
      PORT:                  "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-log-service:
    build:
      context: ./backend
      dockerfile: payment_log/Dockerfile
    ports:
      - "8005:8005"
    expose:
      - "${PAYMENT_LOG_GRPC_PORT}"
    environment:
      DB_HOST:                ${PAYMENT_LOG_DB_HOST}
      DB_PORT:                ${PAYMENT_LOG_DB_PORT}
      DB_USER:                ${POSTGRES_USER}
      DB_PASSWORD:            ${POSTGRES_PASSWORD}
      DB_NAME:                ${PAYMENT_LOG_DB_NAME}
      PAYMENT_LOG_GRPC_PORT:  ${PAYMENT_LOG_GRPC_PORT}
    depends_on:
      payment-log-db:
        condition: service_healthy

  notification-service:
    build:
      context: ./backend
      dockerfile: notification/Dockerfile
    restart: on-failure
    ports:
      - "8011:8011"
    environment:
      RABBITMQ_HOST:   ${RABBITMQ_HOST}
      RABBITMQ_USER:   ${RABBITMQ_USER}
      RABBITMQ_PASS:   ${RABBITMQ_PASS}
      PORT:            8011
      PUBLIC_KEY_PATH: ${PUBLIC_KEY_PATH}
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      rabbitmq:
        condition: service_healthy

  # ── API Gateway ────────────────────────────────────────────────────────────

  kong:
    image: kong:3.6-ubuntu
    volumes:
      - ./kong/kong.yml:/etc/kong/kong.yml:ro
    environment:
      KONG_DATABASE:            "off"          # DB-less declarative mode
      KONG_DECLARATIVE_CONFIG:  /etc/kong/kong.yml
      KONG_PROXY_LISTEN:        0.0.0.0:8000
      KONG_ADMIN_LISTEN:        0.0.0.0:8001
      KONG_ADMIN_GUI_LISTEN:    0.0.0.0:8002
      KONG_ADMIN_GUI_URL:       http://localhost:8200
      KONG_ADMIN_GUI_API_URL:   http://localhost:8100
      KONG_PROXY_ACCESS_LOG:    /dev/stdout
      KONG_ADMIN_ACCESS_LOG:    /dev/stdout
      KONG_PROXY_ERROR_LOG:     /dev/stderr
      KONG_ADMIN_ERROR_LOG:     /dev/stderr
    ports:
      - "8000:8000"   # Proxy — single entry point for all frontend/API calls
      - "8100:8001"   # Admin API — 8100 on host (avoids collision with inventory-service on 8001)
      - "8200:8002"   # Kong Manager GUI — 8200 on host (avoids collision with claim-service on 8002)
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

volumes:
  inventory-db-data:
  claim-log-db-data:
  payment-log-db-data:
  verification-db-data:
  waitlist-db-data:
  rabbitmq-data:
