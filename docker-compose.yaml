services:

  # ── Databases ──────────────────────────────────────────────────────────────

  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${INVENTORY_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - inventory-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${INVENTORY_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  claim-log-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${CLAIM_LOG_DB_NAME}
    ports:
      - "5434:5432"
    volumes:
      - claim-log-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${CLAIM_LOG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-log-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${PAYMENT_LOG_DB_NAME}
    ports:
      - "5435:5432"
    volumes:
      - payment-log-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${PAYMENT_LOG_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  verification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${VERIFICATION_DB_NAME}
    ports:
      - "5436:5432"
    volumes:
      - verification-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${VERIFICATION_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Message Broker ─────────────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI  →  http://localhost:15672

  # ── Services ───────────────────────────────────────────────────────────────

  inventory-service:
    build:
      context: ./backend
      dockerfile: inventory/Dockerfile
    ports:
      - "8001:8001"   # HTTP
      - "50051:50051" # gRPC
    environment:
      DB_HOST:     ${INVENTORY_DB_HOST}
      DB_PORT:     ${INVENTORY_DB_PORT}
      DB_USER:     ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME:     ${INVENTORY_DB_NAME}
    depends_on:
      inventory-db:
        condition: service_healthy

  listing-service:
    build:
      context: ./backend
      dockerfile: listing/Dockerfile
    ports:
      - "8008:8008"
    environment:
      INVENTORY_GRPC_HOST: ${INVENTORY_GRPC_HOST}
      INVENTORY_GRPC_PORT: ${INVENTORY_GRPC_PORT}
      RABBITMQ_HOST:       ${RABBITMQ_HOST}
      RABBITMQ_USER:       ${RABBITMQ_USER}
      RABBITMQ_PASS:       ${RABBITMQ_PASS}
    depends_on:
      rabbitmq:
        condition: service_started
      inventory-service:
        condition: service_started

  claim-service:
    build:
      context: ./backend
      dockerfile: claim/Dockerfile
    ports:
      - "8002:8002"
    environment:
      INVENTORY_GRPC_HOST:     ${INVENTORY_GRPC_HOST}
      INVENTORY_GRPC_PORT:     ${INVENTORY_GRPC_PORT}
      CLAIM_LOG_GRPC_HOST:     ${CLAIM_LOG_GRPC_HOST}
      CLAIM_LOG_GRPC_PORT:     ${CLAIM_LOG_GRPC_PORT}
      RABBITMQ_HOST:           ${RABBITMQ_HOST}
      RABBITMQ_USER:           ${RABBITMQ_USER}
      RABBITMQ_PASS:           ${RABBITMQ_PASS}
      VERIFICATION_GRPC_HOST:  ${VERIFICATION_GRPC_HOST}
      VERIFICATION_GRPC_PORT:  ${VERIFICATION_GRPC_PORT}
      PUBLIC_KEY_PATH:         ${PUBLIC_KEY_PATH}
      # Waitlist table lives in the same Postgres instance as claim-log
      WAITLIST_DATABASE_URL:   postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${CLAIM_LOG_DB_HOST}:${CLAIM_LOG_DB_PORT}/${CLAIM_LOG_DB_NAME}
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      rabbitmq:
        condition: service_started
      inventory-service:
        condition: service_started
      claim-log-service:
        condition: service_started
      verification-service:
        condition: service_started

  verification-service:
    build:
      context: ./backend
      dockerfile: verification_service/Dockerfile
    ports:
      - "8007:8007"   # HTTP (health + login endpoints)
      - "50052:50052" # gRPC
    environment:
      VERIFICATION_GRPC_PORT:     ${VERIFICATION_GRPC_PORT}
      DATABASE_URL:               postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${VERIFICATION_DB_HOST}:${VERIFICATION_DB_PORT}/${VERIFICATION_DB_NAME}
      MAX_DAILY_CLAIMS:           ${MAX_DAILY_CLAIMS}
      MAX_DAILY_PURCHASES:        ${MAX_DAILY_PURCHASES}
      OUTSYSTEMS_API_URL:         ${OUTSYSTEMS_API_URL}
      OUTSYSTEMS_API_KEY:         ${OUTSYSTEMS_API_KEY}
      OUTSYSTEMS_TIMEOUT_SECONDS: ${OUTSYSTEMS_TIMEOUT_SECONDS}
      PUBLIC_KEY_PATH:            ${PUBLIC_KEY_PATH}
      MOCK_OUTSYSTEMS:            ${MOCK_OUTSYSTEMS}
      MOCK_OUTSYSTEMS_APPROVED:   ${MOCK_OUTSYSTEMS_APPROVED}
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      verification-db:
        condition: service_healthy

  claim-log-service:
    build:
      context: ./backend
      dockerfile: claim_log/Dockerfile
    ports:
      - "8006:8006"
    expose:
      - "${CLAIM_LOG_GRPC_PORT}"
    environment:
      DB_HOST:               ${CLAIM_LOG_DB_HOST}
      DB_PORT:               ${CLAIM_LOG_DB_PORT}
      DB_USER:               ${POSTGRES_USER}
      DB_PASSWORD:           ${POSTGRES_PASSWORD}
      DB_NAME:               ${CLAIM_LOG_DB_NAME}
      CLAIM_LOG_GRPC_PORT:   ${CLAIM_LOG_GRPC_PORT}
    depends_on:
      claim-log-db:
        condition: service_healthy

  payment-service:
    build:
      context: ./backend
      dockerfile: payment/Dockerfile
    ports:
      - "8003:8003"
    environment:
      INVENTORY_GRPC_HOST:   ${INVENTORY_GRPC_HOST}
      INVENTORY_GRPC_PORT:   ${INVENTORY_GRPC_PORT}
      RABBITMQ_HOST:         ${RABBITMQ_HOST}
      RABBITMQ_USER:         ${RABBITMQ_USER}
      RABBITMQ_PASS:         ${RABBITMQ_PASS}
      STRIPE_WRAPPER_URL:    ${STRIPE_WRAPPER_URL}
      PAYMENT_LOG_GRPC_HOST: ${PAYMENT_LOG_GRPC_HOST}
      PAYMENT_LOG_GRPC_PORT: ${PAYMENT_LOG_GRPC_PORT}
    depends_on:
      rabbitmq:
        condition: service_started
      inventory-service:
        condition: service_started
      stripe-wrapper:
        condition: service_started
      payment-log-service:
        condition: service_started

  stripe-wrapper:
    build:
      context: ./backend
      dockerfile: stripe_wrapper/Dockerfile
    ports:
      - "8004:8004"
    environment:
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
    # Fully stateless — no DB, no message broker.

  payment-log-service:
    build:
      context: ./backend
      dockerfile: payment_log/Dockerfile
    ports:
      - "8005:8005"
    expose:
      - "${PAYMENT_LOG_GRPC_PORT}"
    environment:
      DB_HOST:                ${PAYMENT_LOG_DB_HOST}
      DB_PORT:                ${PAYMENT_LOG_DB_PORT}
      DB_USER:                ${POSTGRES_USER}
      DB_PASSWORD:            ${POSTGRES_PASSWORD}
      DB_NAME:                ${PAYMENT_LOG_DB_NAME}
      PAYMENT_LOG_GRPC_PORT:  ${PAYMENT_LOG_GRPC_PORT}
    depends_on:
      payment-log-db:
        condition: service_healthy

volumes:
  inventory-db-data:
  claim-log-db-data:
  payment-log-db-data:
  verification-db-data:
